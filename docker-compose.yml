services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fynans
      POSTGRES_PASSWORD: fynans_dev
      POSTGRES_DB: fynans
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fynans"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
