name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/fynans

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (ARM cross-compilation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:latest
            ${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to OCI
    needs: build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            DEPLOY_DIR=/opt/fynans
            IMAGE_PREFIX=ghcr.io/${{ github.repository_owner }}/fynans
            IMAGE_TAG=${{ github.sha }}

            mkdir -p $DEPLOY_DIR
            cd $DEPLOY_DIR

            echo "=== Logging in to GHCR ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "=== Pulling images ==="
            docker pull ${IMAGE_PREFIX}-api:${IMAGE_TAG}
            docker pull ${IMAGE_PREFIX}-web:${IMAGE_TAG}
            docker tag ${IMAGE_PREFIX}-api:${IMAGE_TAG} ${IMAGE_PREFIX}-api:latest
            docker tag ${IMAGE_PREFIX}-web:${IMAGE_TAG} ${IMAGE_PREFIX}-web:latest

      # SCP config files from repo to VM (Caddyfile + docker-compose)
      - name: Copy config files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: /opt/fynans
          overwrite: true

      - name: Start services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            cd /opt/fynans

            echo "=== Starting/updating services ==="
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d

            echo "=== Waiting for health check ==="
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
                echo "API healthy!"
                break
              fi
              echo "Waiting... ($i/30)"
              sleep 2
            done

            curl -f http://localhost:8000/api/health || echo "WARNING: Health check failed"

            echo "=== Cleanup old images ==="
            docker image prune -f

            echo "=== Deployment complete ==="
            docker compose -f docker-compose.prod.yml ps
