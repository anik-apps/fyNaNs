[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "S", "B", "A", "C4", "SIM"]
ignore = [
    "S101",  # Allow assert in tests
    "S105",  # False positives on token_type = "bearer" etc
    "S106",  # False positives on password_hash in tests
    "S110",  # Allow try-except-pass for optional body parsing
    "B008",  # Depends() in function defaults is standard FastAPI pattern
]

[tool.ruff.lint.isort]
known-first-party = ["src"]
